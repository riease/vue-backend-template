    SystemChecklistDetail:
      type: object
      description: 檢核表詳細內容，對應原型編輯畫面的完整資料。
      required:
        - uid
        - assessmentYear
        - formNumber
        - assessmentDate
        - snapshotLevel
        - system
        - controlItems
      properties:
        uid:
          type: string
          format: uuid
        assessmentYear:
          type: integer
          description: 年度，對應 `system_checklists.assessment_year`。原型為唯讀欄位。
        formNumber:
          type: string
          description: 表單編號，對應 `system_checklists.form_number`。
        snapshotLevel:
          allOf:
            - $ref: "#/components/schemas/ProtectionLevel"
          description: 評估建立時當下的資通系統防護等級，對應 `system_checklists.snapshot_level`。
        snapshotLevelDisplayName:
          type: string
          description: 評估建立時當下的資通系統防護等級顯示文字。
        assessmentDate:
          type: string
          format: date
          description: 評估日期，對應 `system_checklists.assessment_date`。原型為可編輯日期欄位。
        assessmentStatus:
          type: string
          description: 評估狀態，對應 `system_checklists.assessment_status`。
        assessmentStatusDisplayName:
          type: string
          description: 評估狀態顯示文字。
        snapshotInformationSystem:
          description: 評估建立時當下的資通系統資訊，對應 `system_checklists.snapshot_information_system`。
          $ref: "#/components/schemas/InformationSystemSummary"
        informationSystem:
          description: 當下的資通系統資訊，對應 `system_checklists.information_system`。
          $ref: "#/components/schemas/InformationSystemSummary"
        controlItems:
          type: array
          description: 檢核控制項列表。
          items:
            $ref: "#/components/schemas/ChecklistControlTree"
        #            $ref: '#/components/schemas/ChecklistControlItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
    #        protectionLevelAssessmentUid:
    #          type: string
    #          format: uuid
    #          description: 評估建立時當下的資通系統防護等級評估表 UID，對應 `system_checklists.protection_level_assessment_uid`。
    ListSystemChecklistsResponse:
      type: object
      description: 檢核表列表查詢回應。
      required:
        - paging
        - items
      properties:
        paging:
          $ref: "#/components/schemas/Paging"
        items:
          type: array
          items:
            $ref: "#/components/schemas/SystemChecklistSummary"
    CreateSystemChecklistRequest:
      type: object
      description: |
        新增檢核表請求，對應原型 `prototype/system_checklist_add.html` 的新增表單。
        - 年度：唯讀，由 assessmentYear 參數帶入
        - 評估日期：可編輯日期欄位
        - 資通系統名稱：下拉選單，由 systemUid 參數帶入
        - 資通系統防護安全等級：選擇系統後自動帶出
        - 資通系統維護/開發商：選擇系統後自動帶出
        - 承辦單位：選擇系統後自動帶出
        - 承辦人姓名：選擇系統後自動帶出
      required:
        - systemUid
        - assessmentDate
        - controlItems
      properties:
        systemUid:
          type: string
          format: uuid
          description: 資通系統唯一識別碼，對應原型「資通系統名稱」下拉選單。
        assessmentDate:
          type: string
          format: date
          description: 評估日期，對應原型「評估日期」欄位。
        controlItems:
          type: array
          description: 控制項評估列表，對應原型表格中的評估結果與備註。
          minItems: 1
          items:
            $ref: "#/components/schemas/ChecklistControlItemBasic"
    UpdateChecklistControlItem:
      type: object
      required:
        - uid
        - status
      properties:
        uid:
          type: string
          format: uuid
          description: 檢核控制項唯一識別碼，對應 `system_checklist_controls.uid`。
        status:
          $ref: "#/components/schemas/ControlStatus"
        notes:
          type: string
          description: 備註說明。
          nullable: true
    UpdateSystemChecklistRequest:
      type: object
      description: |
        更新檢核表請求，對應原型 `prototype/system_checklist_add.html` 的「送出」操作。
        至少提供一個欄位或一筆控制項更新。
      minProperties: 1
      properties:
        assessmentDate:
          type: string
          format: date
          description: 評估日期，對應原型「評估日期」欄位。
        controlItems:
          type: array
          description: 控制項更新列表，對應原型表格中的評估結果與備註。
          minItems: 1
          items:
            $ref: "#/components/schemas/UpdateChecklistControlItem"
