openapi: 3.1.0
info:
  title: InformationSystems 資通系統基本資料維護
  description: |
    ## API 清單
    * InformationSystems-Create 新增資通系統
    * InformationSystems-Search 查詢資通系統列表
    * InformationSystems-Read 查詢資通系統
    * InformationSystems-Update 更新資通系統
    * InformationSystems-Delete 刪除資通系統

    ## 非 200 狀態回應說明
    目前定義的異常狀態如下，以下狀態於各 API 回應內容格式皆相同，因此各 API 僅描述成功 (2xx) 回應：
    * 請求格式錯誤。http status code 400。
    * 缺少 ApiKey、AccessToken 或是驗證失敗。http status code 401。
    * 操作權限不足。http status code 403。
    * 請求的資源不存在。http status code 404。
    * 資源衝突錯誤。http status code 409。
    * 伺服端錯誤。http status code 500。

    ## 參考文件
    * 資料庫規格：`docs/DB/database-schema.sql`
    * BDD 規格：`docs/features/資通系統基本資料維護.feature`
  version: 1.0.0
servers:
  - url: "{baseUrl}/api/{version}/information-systems"
    variables:
      baseUrl:
        description: 主機網址
        default: "https://api.example.com"
      version:
        description: 版號
        default: "v1"
tags:
  - name: InformationSystems
    description: 資通系統基本資料維護 (CRUD) 作業
security:
  - bearerAuth: []
paths:
  /:
    get:
      tags:
        - InformationSystems
      summary: 查詢資通系統列表
      operationId: InformationSystems-Search
      description: |
        依 `docs/features/資通系統基本資料維護.feature` 的「依資通系統名稱查詢」、「瀏覽資通系統列表分頁」情境，
        提供名稱、共同性系統、維護/開發商與啟用狀態等條件式查詢，並支援分頁。資料來源為
        `public.information_systems`，同時關聯 `public.accounts` (系統負責人) 與 `public.tenants` (租戶資訊)。
        查詢結果依 `updated_at` DESC、`created_at` DESC 排序。
      parameters:
        #        - $ref: '#/components/parameters/TenantHeader'
        - $ref: "#/components/parameters/SystemNameFilterParam"
        - $ref: "#/components/parameters/SystemCodeFilterParam"
        - $ref: "#/components/parameters/SharedSystemFilterParam"
        - $ref: "#/components/parameters/VendorFilterParam"
        - $ref: "#/components/parameters/SystemStatusFilterParam"
        #        - $ref: '#/components/parameters/OwnerFilterParam'
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
        - $ref: "#/components/parameters/SortByParam"
        - $ref: "#/components/parameters/SortOrderParam"
      x-related-tables:
        - public.information_systems
        - public.accounts
        - public.tenants
      responses:
        "200":
          description: 資通系統分頁結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInformationSystemssResponse"
              examples:
                default:
                  summary: 依名稱與狀態篩選
                  value:
                    paging:
                      limit: 10
                      offset: 0
                      total: 2
                    items:
                      - uid: e0cde1d8-8cfb-4515-8fd6-6b889e3bcfa4
                        name: 客戶關係管理系統
                        code: IS-001
                        isSharedSystem: false
                        vendorName: 超級厲害股份有限公司
                        status: ENABLED
                        protectionLevel: HIGH
                        #                        systemOwner:
                        #                          uid: 5e4d3c2b-9a18-4b2f-84fc-7dd2a6765e20
                        #                          username: admin
                        #                          contactName: 王小明
                        #                          email: admin@example.com
                        #                        tenant:
                        #                          uid: 9f58b333-1d0b-4c3f-9f8d-a90ee6aded0a
                        #                          name: 耐辰資訊
                        #                        notes: 供客服中心使用
                        createdAt: 2024-02-12T03:12:11Z
                        updatedAt: 2024-03-01T07:55:30Z
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
    post:
      tags:
        - InformationSystems
      summary: 新增資通系統
      operationId: InformationSystems-Create
      description: |
        對應 BDD「新增資通系統資料」與「新增資通系統時缺少必要欄位」情境，
        需驗證名稱、共同性系統、維護/開發商與狀態等必填欄位，並寫入 `public.information_systems`。
        名稱需符合唯一性 (unique key `information_systems.name`)。
        <!-- 系統負責人 UID 需存在於 `public.accounts` (目前未支援) -->
      #      parameters:
      #        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInformationSystemsRequest"
            examples:
              default:
                summary: 建立共同性系統
                value:
                  name: 企業資源規劃系統_新
                  code: IS-001
                  isSharedSystem: true
                  vendorName: 宇宙最強股份有限公司
                  status: ENABLED
                  description: 供全公司採購與財務單位使用
                  notes: 需與 ERP 匯入排程同步
                  handlingUnit: 技術開發組
                  handlerName: 王大明
      #                  systemOwnerUid: 5e4d3c2b-9a18-4b2f-84fc-7dd2a6765e20
      #                  tenantUid: 9f58b333-1d0b-4c3f-9f8d-a90ee6aded0a
      x-related-tables:
        - public.information_systems
        - public.accounts
        - public.tenants
      responses:
        "201":
          description: 建立成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InformationSystemsDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"
  /{systemId}:
    get:
      tags:
        - InformationSystems
      summary: 查詢資通系統
      operationId: InformationSystems-Read
      description: |
        依 BDD「編輯資通系統資料」前的預填需求，回傳指定系統的完整資訊，
        以便前端顯示在「新增/編輯」表單。
        <!-- 包含系統負責人 (目前未支援) -->
      parameters:
        #        - $ref: '#/components/parameters/TenantHeader'
        - $ref: "#/components/parameters/SystemIdPathParam"
      x-related-tables:
        - public.information_systems
        - public.accounts
        - public.tenants
      responses:
        "200":
          description: 系統詳細資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InformationSystemsDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
    put:
      tags:
        - InformationSystems
      summary: 更新資通系統
      operationId: InformationSystems-Update
      description: |
        依 BDD「編輯資通系統資料」與「新增資通系統時缺少必要欄位」規則，
        更新名稱、共同性系統、維護/開發商、狀態與備註。更新會寫入 `public.information_systems`
        並更新 `updated_at` 欄位。
      parameters:
        #        - $ref: '#/components/parameters/TenantHeader'
        - $ref: "#/components/parameters/SystemIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInformationSystemsRequest"
      x-related-tables:
        - public.information_systems
        - public.accounts
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InformationSystemsDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      tags:
        - InformationSystems
      summary: 刪除資通系統
      operationId: InformationSystems-Delete
      description: |
        對應 BDD「刪除資通系統資料」情境。刪除動作為軟刪除，將 `public.information_systems.deleted` 標記為 true，
        並針對 `public.system_ci_map`、`public.protection_level_assessments` 等關聯資料檢查是否可安全移除或阻擋操作。
      parameters:
        #        - $ref: '#/components/parameters/TenantHeader'
        - $ref: "#/components/parameters/SystemIdPathParam"
      x-related-tables:
        - public.information_systems
        - public.system_ci_map
        - public.protection_level_assessments
      responses:
        "204":
          description: 刪除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantHeader:
      name: X-Tenant-Uid
      in: header
      description: 指定租戶識別碼 (對應 `information_systems.tenant_uid`)。雖是非必填，但建議提供以提升防呆安全性(尤其是平台管理員在跨租戶操作時)。
      required: false
      schema:
        type: string
        format: uuid
    LimitParam:
      name: limit
      in: query
      description: 回傳筆數上限，預設 20，最大 100。
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      description: 查詢位移量，搭配 `limit` 使用。
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    SystemNameFilterParam:
      name: name
      in: query
      description: 模糊比對資通系統名稱。
      required: false
      schema:
        type: string
        minLength: 1
    SystemCodeFilterParam:
      name: code
      in: query
      description: 完整比對資通系統代碼。
      required: false
      schema:
        type: string
        minLength: 1
    SharedSystemFilterParam:
      name: isSharedSystem
      in: query
      description: 是否為共同性系統。
      required: false
      schema:
        type: boolean
    VendorFilterParam:
      name: vendorName
      in: query
      description: 維護/開發商名稱 (支援模糊查詢)。
      required: false
      schema:
        type: string
        minLength: 1
    SystemStatusFilterParam:
      name: status
      in: query
      description: 依啟用狀態篩選。
      required: false
      schema:
        $ref: "#/components/schemas/SystemStatus"
    SortByParam:
      name: sortBy
      in: query
      description: 排序欄位，預設 `createdAt`。
      required: false
      schema:
        type: string
        enum:
          - createdAt
          - name
          - code
          - isSharedSystem
          - status
        default: createdAt
    SortOrderParam:
      name: sortOrder
      in: query
      description: 排序方向，預設 `DESC` (由新到舊)。
      required: false
      schema:
        type: string
        enum:
          - ASC
          - DESC
        default: DESC
    #    OwnerFilterParam:
    #      name: systemOwnerUid
    #      in: query
    #      description: 依系統負責人篩選，對應 `information_systems.system_owner_uid`。
    #      required: false
    #      schema:
    #        type: string
    #        format: uuid
    SystemIdPathParam:
      name: systemId
      in: path
      description: 資通系統唯一識別碼 (`information_systems.uid`)。
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          minimum: 400
        error:
          type: string
        code:
          type: string
          description: 系統定義錯誤代碼（例如 `INFORMATION_SYSTEM_DUPLICATE_NAME`）。
        message:
          type: string
        path:
          type: string
          description: 觸發錯誤的 API 路徑
        traceId:
          type: string
          description: 方便串接觀察性的追蹤 Id
        details:
          type: array
          items:
            $ref: "#/components/schemas/FieldViolation"
    FieldViolation:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
        rejectedValue:
          description: 提供除錯用途的原始值（必要時遮蔽）。
          oneOf:
            - type: string
            - type: number
            - type: boolean
    Paging:
      description: 分頁資訊
      type: object
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
    SystemStatus:
      type: string
      description: 資通系統啟用狀態，對應 `information_systems.enabled`。
      enum:
        - ENABLED
        - DISABLED
    AccountSummary:
      type: object
      required:
        - uid
        - username
      properties:
        uid:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          description: 來源自 `accounts.contact_name`。
    TenantSummary:
      type: object
      required:
        - uid
        - name
      properties:
        uid:
          type: string
          format: uuid
        name:
          type: string
    #    SystemOwnerSummary:
    #      type: object
    #      required:
    #        - uid
    #        - username
    #        - contactName
    #      properties:
    #        uid:
    #          type: string
    #          format: uuid
    #        username:
    #          type: string
    #        contactName:
    #          type: string
    #        email:
    #          type: string
    #          format: email
    InformationSystemsSummary:
      type: object
      required:
        - uid
        - name
        - isSharedSystem
        - vendorName
        - status
        - createdAt
      properties:
        uid:
          type: string
          format: uuid
        #        tenant:
        #          $ref: '#/components/schemas/TenantSummary'
        name:
          type: string
          description: 資通系統名稱
        code:
          type: string
          description: 資通系統代號
        isSharedSystem:
          type: boolean
        vendorName:
          type: string
        status:
          $ref: "#/components/schemas/SystemStatus"
        #        systemOwner:
        #          $ref: '#/components/schemas/SystemOwnerSummary'
        #        notes:
        #          type: string
        protectionLevel:
          type: string
          description: 防護需求等級。完成防護需求等級評估後同步更新。
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    InformationSystemsDetail:
      allOf:
        - $ref: "#/components/schemas/InformationSystemsSummary"
        - type: object
          properties:
            description:
              type: string
            handlingUnit:
              type: string
              description: 承辦單位
            handlerName:
              type: string
              description: 承辦人姓名
            createdBy:
              $ref: "#/components/schemas/AccountSummary"
            updatedBy:
              $ref: "#/components/schemas/AccountSummary"
    ListInformationSystemssResponse:
      type: object
      required:
        - paging
        - items
      properties:
        paging:
          $ref: "#/components/schemas/Paging"
        items:
          type: array
          items:
            $ref: "#/components/schemas/InformationSystemsSummary"
    BaseInformationSystemsRequest:
      type: object
      required:
        - name
        - isSharedSystem
        - status
        - handlingUnit
      properties:
        name:
          type: string
          description: 資通系統名稱
          minLength: 1
          maxLength: 255
        code:
          type: string
          description: 資通系統代號
          minLength: 1
          maxLength: 50
        isSharedSystem:
          type: boolean
          description: 是否為共同性系統
        vendorName:
          type: string
          description: 資通系統維護/開發商名稱
          maxLength: 255
        status:
          $ref: "#/components/schemas/SystemStatus"
        description:
          type: string
          description: 資通系統描述說明
        notes:
          type: string
          description: 備註
        handlingUnit:
          type: string
          description: 承辦單位
        handlerName:
          type: string
          description: 承辦人姓名
    #        systemOwnerUid:
    #          type: string
    #          format: uuid
    #          description: 系統負責人 (`accounts.uid`)，可為空表示尚未指定。
    CreateInformationSystemsRequest:
      allOf:
        - $ref: "#/components/schemas/BaseInformationSystemsRequest"
    #        - type: object
    #          properties:
    #            tenantUid:
    #              type: string
    #              format: uuid
    #              description: |
    #                * 租戶識別碼 (`tenants.uid`)，若省略則依 `X-Tenant-Uid` 推論。
    #                * 若是租戶帳號可省略，資料欄位中不必出現租戶(客戶)名稱欄位。
    #                * 若是平台管理員則不可省略，畫面中出現租戶(客戶)名稱欄位，值為當前代理的租戶名稱，此為方便平台管理員識別以減少人為操作失誤。
    UpdateInformationSystemsRequest:
      allOf:
        - $ref: "#/components/schemas/BaseInformationSystemsRequest"
  responses:
    BadRequest:
      description: 請求參數或內容錯誤
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未通過身分驗證或憑證失效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: 已登入但權限不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 找不到指定資源
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 資源狀態衝突（例如系統名稱重複或存在關聯資料）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: 未預期的伺服器錯誤
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
