openapi: 3.1.0
info:
  title: InformationConfigurations 資訊組態管理
  description: |
    ## API 清單
    * InformationConfigurations-Create 新增資訊組態
    * InformationConfigurations-Search 查詢資訊組態列表
    * InformationConfigurations-Read 查詢資訊組態
    * InformationConfigurations-Update 更新資訊組態
    * InformationConfigurations-Delete 刪除資訊組態
        
    ## 非200狀態回應說明
    目前定義的異常狀態如下，以下狀態於各API回應內容格式皆相同，因此各API預設只描述正常 200 的回應情況。
    * 請求格式錯誤。 http status code 400。
    * 缺少 ApiKey, AccessToken 或是驗證失敗。 http status code 401。
    * 操作權限不足。 http status code 403。
    * 請求的資源不存在。 http status code 404。
    * 資源衝突錯誤。 http status code 409。
    * 伺服端錯誤。 http status code 500。
  version: 1.0.0
servers:
  - url: "{baseUrl}/api/{version}/information-configurations"
    variables:
      baseUrl:
        description: 主機網址
        default: "https://api.example.com"
      version:
        description: 版號
        default: "v1"
paths:
  /:
    post:
      operationId: createInformationConfiguration
      summary: InformationConfigurations-Create 新增資訊組態
      description: 新增一筆資訊組態資料
      tags:
        - InformationConfigurations
      #      parameters:
      #        - $ref: '#/components/parameters/XTenantUidHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInformationConfigurationRequest"
      responses:
        "200":
          description: 成功新增資訊組態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InformationConfigurationDetail"
    get:
      operationId: searchInformationConfigurations
      summary: InformationConfigurations-Search 查詢資訊組態列表
      description: 依條件查詢資訊組態列表，支援分頁
      tags:
        - InformationConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - name: configurationCode
          in: query
          description: 組態編號 (支援模糊查詢)
          required: false
          schema:
            type: string
            example: "IM-2-1-001"
        - name: name
          in: query
          description: 資產名稱 (支援模糊查詢)
          required: false
          schema:
            type: string
            example: "檔案名稱"
        - name: containsPersonalData
          in: query
          description: 是否含有個人資料
          required: false
          schema:
            type: boolean
        #        - $ref: '#/components/parameters/CategoryFilterParam'
        - $ref: "#/components/parameters/SubcategoryFilterParam"
        - $ref: "#/components/parameters/StatusFilterParam"
        - $ref: "#/components/parameters/OffsetParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SortByParam"
        - $ref: "#/components/parameters/SortOrderParam"
      responses:
        "200":
          description: 資訊組態分頁結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InformationConfigurationListResponse"
              examples:
                default:
                  summary: 依子類別與狀態查詢
                  value:
                    paging:
                      limit: 10
                      offset: 0
                      total: 2
                    items:
                      - uid: 99999999-aaaa-bbbb-cccc-dddddddddddd
                        configurationCode: IM-2-1-001
                        name: 檔案名稱
                        category: IM
                        subcategory: IM-PAPER
                        categoryDisplayName: "INFORMATION,IM"
                        subcategoryDisplayName: "5-2 Paper"
                        containsPersonalData: true
                        status: ENABLED
                        createdAt: 2024-03-01T02:00:00Z
                        updatedAt: 2024-04-05T07:30:00Z
                      - uid: 88888888-aaaa-bbbb-cccc-dddddddddddd
                        configurationCode: IM-2-1-002
                        name: 記錄檔
                        category: IM
                        subcategory: IM-INFO
                        categoryDisplayName: "INFORMATION,IM"
                        subcategoryDisplayName: "5-1 Information"
                        containsPersonalData: false
                        status: DISABLED
                        createdAt: 2024-02-10T05:12:00Z
                        updatedAt: 2024-02-20T03:45:00Z
  /{uid}:
    get:
      operationId: readInformationConfiguration
      summary: InformationConfigurations-Read 查詢資訊組態
      description: 依 UID 查詢單筆資訊組態詳細資料
      tags:
        - InformationConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - $ref: "#/components/parameters/UidPath"
      responses:
        "200":
          description: 成功查詢資訊組態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InformationConfigurationDetail"
    put:
      operationId: updateInformationConfiguration
      summary: InformationConfigurations-Update 更新資訊組態
      description: 更新單筆資訊組態資料
      tags:
        - InformationConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - $ref: "#/components/parameters/UidPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInformationConfigurationRequest"
      responses:
        "200":
          description: 成功更新資訊組態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InformationConfigurationDetail"
    delete:
      operationId: deleteInformationConfiguration
      summary: InformationConfigurations-Delete 刪除資訊組態
      description: 軟刪除單筆資訊組態資料 (設定 deleted=true)
      tags:
        - InformationConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - $ref: "#/components/parameters/UidPath"
      responses:
        "204":
          description: 刪除成功，無回應內容
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 認證 Token
  parameters:
    XTenantUidHeader:
      name: X-Tenant-Uid
      in: header
      description: 租戶識別碼 (平臺管理員代理租戶時使用)。雖是非必填，但建議提供以提升防呆安全性(尤其是平台管理員在跨租戶操作時)。
      required: false
      schema:
        type: string
        format: uuid
    UidPath:
      name: uid
      in: path
      description: 資源的唯一識別碼
      required: true
      schema:
        type: string
        format: uuid
    CategoryFilterParam:
      name: category
      in: query
      description: 類別。
      required: false
      schema:
        type: string
    SubcategoryFilterParam:
      name: subcategory
      in: query
      description: 子類別。
      required: false
      schema:
        type: string
    StatusFilterParam:
      name: status
      in: query
      description: 依啟用狀態篩選。
      required: false
      schema:
        $ref: "#/components/schemas/ConfigurationStatus"
    SortByParam:
      name: sortBy
      in: query
      description: 排序欄位，預設 `configurationCode`。
      required: false
      schema:
        type: string
        enum:
          - configurationCode
          - name
          - subcategory
          - status
        default: configurationCode
    SortOrderParam:
      name: sortOrder
      in: query
      description: 排序方向，預設 `ASC`。
      required: false
      schema:
        type: string
        enum:
          - ASC
          - DESC
        default: ASC
    LimitParam:
      name: limit
      in: query
      description: 回傳筆數上限，預設 20，最大 100。
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      description: 查詢位移量，搭配 `limit` 使用。
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
  schemas:
    # ==================== 請求 Schemas ====================
    BaseInformationConfigurationRequest:
      type: object
      description: 資訊組態請求資料
      required:
        - configurationCode
        - name
        - category
        - subcategory
        - storageLocation
        - containsPersonalData
        - status
        - storageLocation
        - informationSystemUids
      properties:
        configurationCode:
          type: string
          maxLength: 100
          description: 組態編號 (例如：IM-2-1-001)
          example: "IM-5-1-001"
        name:
          type: string
          maxLength: 255
          description: 資產名稱
          example: "檔案名稱"
        description:
          type: string
          description: 組態項目的詳細說明
          example: "包含客戶資料的檔案"
        category:
          type: string
          maxLength: 100
          description: 組態分類 (例如：2 Information, IM)
          example: "IM"
        subcategory:
          type: string
          maxLength: 100
          description: 組態子分類 (例如：資料庫、文件)
          example: "IM-INFO"
        model:
          type: string
          maxLength: 255
          description: 資產型號或型態 (例如：電子、紙本)
          example: "電子"
        #        classification:
        #          type: string
        #          maxLength: 100
        #          description: 資訊資產分類 (DB 欄位，原型未顯示)
        responsibleDepartment:
          type: string
          maxLength: 255
          description: 權責部門名稱
          example: "資訊部"
        responsibleManager:
          type: string
          maxLength: 255
          description: 權責主管
          example: "王大明"
        assetOwner:
          type: string
          maxLength: 255
          description: 資產擁有者
          example: "李小華"
        #        assetCustodian:
        #          type: string
        #          maxLength: 255
        #          description: 資產管理者/保管人 (DB 欄位，原型未顯示)
        #        location:
        #          type: string
        #          maxLength: 255
        #          description: 資產所在地點或保存地點
        #          example: "總部資料室"
        #        ownerUid:
        #          type: string
        #          format: uuid
        #          description: 此資產的負責人 UID (DB 欄位，原型未顯示)
        #        departmentUid:
        #          type: string
        #          format: uuid
        #          description: 此資產所屬的部門 UID (DB 欄位，原型未顯示)
        storageLocation:
          type: string
          description: 資訊資產保存位置 (例如：資料庫、文件櫃)
          example: "客戶資料庫叢集"
        containsPersonalData:
          type: boolean
          description: 是否含有個人資料；為 true 時需同步填寫個資欄位
          example: true
        processName:
          type: string
          description: 作業流程名稱
          example: "客戶關係維護"
        personalDataFileName:
          type: string
          description: 個資檔案名稱
          example: "CRM_CUSTOMER_PROFILE"
        personalDataFileType:
          type: string
          description: 檔案型態
          example: "資料表"
        retentionBasis:
          type: string
          description: 保有依據
          example: "個資法第 15 條"
        specificPurpose:
          type: string
          description: 特定目的
          example: "行銷與客戶服務"
        #        personalDataCategories:
        #          type: array
        #          description: 個人資料類別 (多選)
        #          items:
        #            type: string
        #          example: [ "姓名", "生日", "聯絡方式" ]
        personalDataCategory:
          type: string
          description: 個人資料類別
        #          items:
        #            type: string
        #          example: [ "姓名", "生日", "聯絡方式" ]
        personalDataItems:
          type: array
          description: 個人資料項目(多選)
          items:
            type: string
            example: ["姓名", "生日", "聯絡方式"]
        #        personalDataItems:
        #          type: string
        #          description: 個人資料項目說明
        #          example: "姓名、電話、電子郵件、出生年月日"
        collectionMethod:
          type: string
          description: 個人資料蒐集方式
          example: "線上表單填寫"
        collectionSource:
          type: string
          description: 個人資料蒐集來源
          example: "客戶本人提供"
        collectionChannel:
          type: string
          description: 個人資料蒐集管道
          example: "官網、行動 APP"
        legalRetentionPeriod:
          type: string
          description: 法定保存期限
          example: "5 年"
        customRetentionPeriod:
          type: string
          description: 自訂保存期限
          example: "7 年"
        disposalMethod:
          type: string
          description: 銷毀方式
          example: "資料刪除並覆寫"
        disposalCycle:
          type: string
          description: 銷毀週期
          example: "每季"
        usagePurpose:
          type: string
          description: 利用目的
          example: "會員服務、行銷分析"
        usageUnit:
          type: string
          description: 利用單位
          example: "行銷部"
        crossBorderTransferUnit:
          type: string
          description: 國際傳輸單位
          example: "海外客服中心"
        crossBorderTransferChannel:
          type: string
          description: 國際傳輸管道
          example: "VPN 專線"
        outsourcingFlag:
          type: boolean
          description: 是否委外處理
          example: false
        outsourcingItems:
          type: string
          description: 委外項目 (若 outsourcingFlag 為 true 時需填寫)
          example: "資料備援維運"
        status:
          $ref: "#/components/schemas/ConfigurationStatus"
        note:
          type: string
          description: 備註
          example: "個資盤點 2025Q1 完成"
        informationSystemUids:
          description: 關聯的資通系統 UID 清單
          type: array
          items:
            type: string
            format: uuid
            description: 關聯資通系統 UID
            example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
    CreateInformationConfigurationRequest:
      allOf:
        - $ref: "#/components/schemas/BaseInformationConfigurationRequest"
    UpdateInformationConfigurationRequest:
      allOf:
        - $ref: "#/components/schemas/BaseInformationConfigurationRequest"
    # ==================== 回應 Schemas ====================
    InformationConfigurationSummary:
      type: object
      description: 資訊組態列表項目（簡化版）
      properties:
        uid:
          type: string
          format: uuid
          description: 資訊組態的唯一識別碼
        configurationCode:
          type: string
          description: 組態編號
        name:
          type: string
          description: 資產名稱
        createdAt:
          type: string
          format: date-time
          description: 建立時間 (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: 更新時間 (ISO 8601)
        category:
          type: string
          description: 組態分類
        subcategory:
          type: string
          description: 組態子分類
        categoryDisplayName:
          type: string
          description: 組態類別顯示名稱(名稱,代碼)
        subcategoryDisplayName:
          type: string
          description: 組態子類別顯示名稱(項次 名稱)
        containsPersonalData:
          type: boolean
          description: 是否含個人資料
        status:
          $ref: "#/components/schemas/ConfigurationStatus"
    InformationConfigurationListResponse:
      type: object
      required:
        - paging
        - items
      properties:
        paging:
          $ref: "#/components/schemas/Paging"
        items:
          type: array
          items:
            $ref: "#/components/schemas/InformationConfigurationSummary"
    InformationConfigurationDetail:
      type: object
      description: 資訊組態回應資料
      allOf:
        - $ref: "#/components/schemas/InformationConfigurationSummary"
        - type: object
          properties:
            #            tenant:
            #              $ref: '#/components/schemas/TenantSummary'
            configurationCodePrefix:
              type: string
              description: 組態編號的前綴代號
            configurationCodeSerialNumber:
              type: string
              description: 組態編號的後3碼流水號
            ciType:
              type: string
              description: 組態項目類型 (固定為 INFORMATION)
              example: "INFORMATION"
            description:
              type: string
              description: 組態項目的詳細說明
            model:
              type: string
              description: 資產型號或型態
            #            classification:
            #              type: string
            #              description: 資訊資產分類 (DB 欄位，原型未顯示)
            responsibleDepartment:
              type: string
              description: 權責部門名稱
            responsibleManager:
              type: string
              description: 權責主管
            assetOwner:
              type: string
              description: 資產擁有者
            #            assetCustodian:
            #              type: string
            #              description: 資產管理者/保管人 (DB 欄位，原型未顯示)
            #            location:
            #              type: string
            #              description: 資產所在地點或保存地點
            storageLocation:
              type: string
              description: 資訊資產保存位置
            containsPersonalData:
              type: boolean
              description: 是否含有個人資料
            processName:
              type: string
              description: 作業流程名稱
            personalDataFileName:
              type: string
              description: 個資檔案名稱
            personalDataFileType:
              type: string
              description: 檔案型態
            retentionBasis:
              type: string
              description: 保有依據
            specificPurpose:
              type: string
              description: 特定目的
            personalDataCategory:
              type: string
              description: 個人資料類別
            personalDataItems:
              type: array
              description: 個人資料項目(多選)
              items:
                type: string
                example: ["姓名", "生日", "聯絡方式"]
            collectionMethod:
              type: string
              description: 個人資料蒐集方式
            collectionSource:
              type: string
              description: 個人資料蒐集來源
            collectionChannel:
              type: string
              description: 個人資料蒐集管道
            legalRetentionPeriod:
              type: string
              description: 法定保存期限
            customRetentionPeriod:
              type: string
              description: 自訂保存期限
            disposalMethod:
              type: string
              description: 銷毀方式
            disposalCycle:
              type: string
              description: 銷毀週期
            usagePurpose:
              type: string
              description: 利用目的
            usageUnit:
              type: string
              description: 利用單位
            crossBorderTransferUnit:
              type: string
              description: 國際傳輸單位
            crossBorderTransferChannel:
              type: string
              description: 國際傳輸管道
            outsourcingFlag:
              type: boolean
              description: 是否委外處理
            outsourcingItems:
              type: string
              description: 委外項目
            status:
              $ref: "#/components/schemas/ConfigurationStatus"
            note:
              type: string
              description: 備註
            informationSystems:
              description: 關聯的資通系統
              type: array
              items:
                - $ref: "#/components/schemas/InformationSystemSummary"
            createdAt:
              type: string
              format: date-time
              description: 資料建立時間
            updatedAt:
              type: string
              format: date-time
              description: 資料最後更新時間
            createdBy:
              $ref: "#/components/schemas/AccountSummary"
            updatedBy:
              $ref: "#/components/schemas/AccountSummary"
    InformationSystemSummary:
      type: object
      description: 資通系統參照
      properties:
        uid:
          type: string
          format: uuid
          description: 資通系統 UID
        name:
          type: string
          description: 資通系統名稱
        status:
          type: string
          description: 啟用狀態 (ENABLED/DISABLED)
          enum:
            - ENABLED
            - DISABLED
    AccountSummary:
      type: object
      required:
        - uid
        - username
      properties:
        uid:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          description: 來源自 `accounts.display_name`。聯絡人姓名。
    TenantSummary:
      type: object
      required:
        - uid
        - name
      properties:
        uid:
          type: string
          format: uuid
        name:
          type: string
    # ==================== 分頁 Schemas ====================
    Paging:
      description: 分頁資訊
      type: object
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
    # ==================== 通用 Schemas ====================
    ConfigurationStatus:
      type: string
      description: 啟用狀態。
      enum:
        - ENABLED
        - DISABLED
    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          minimum: 400
        error:
          type: string
        code:
          type: string
          description: 系統定義錯誤代碼（例如 `ACCOUNT_DUPLICATE_USERNAME`）。
        message:
          type: string
        path:
          type: string
          description: 觸發錯誤的 API 路徑
        traceId:
          type: string
          description: 方便串接觀察性的追蹤 Id
        details:
          type: array
          items:
            $ref: "#/components/schemas/FieldViolation"
    FieldViolation:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
        rejectedValue:
          description: 提供除錯用途的原始值（必要時遮蔽）。
          oneOf:
            - type: string
            - type: number
            - type: boolean

  responses:
    BadRequest:
      description: 請求參數或內容錯誤
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未通過身分驗證或憑證失效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: 已登入但權限不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 找不到指定資源
      content:
