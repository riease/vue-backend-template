openapi: 3.1.0
info:
  title: AR3-HardwareConfigurations 硬體組態管理
  description: |
    ## API 清單
    * AR3-HardwareConfigurations-Create 新增硬體組態
    * AR3-HardwareConfigurations-Search 查詢硬體組態列表
    * AR3-HardwareConfigurations-Read 查詢硬體組態
    * AR3-HardwareConfigurations-Update 更新硬體組態
    * AR3-HardwareConfigurations-Delete 刪除硬體組態

    ## 非200狀態回應說明
    目前定義的異常狀態如下，以下狀態於各API回應內容格式皆相同，因此各API預設只描述正常 200 的回應情況。
    * 請求格式錯誤。 http status code 400。
    * 缺少 ApiKey, AccessToken 或是驗證失敗。 http status code 401。
    * 操作權限不足。 http status code 403。
    * 請求的資源不存在。 http status code 404。
    * 資源衝突錯誤。 http status code 409。
    * 伺服端錯誤。 http status code 500。
  version: 1.0.0
servers:
  - url: "{baseUrl}/api/{version}/hardware-configurations"
    variables:
      baseUrl:
        description: 主機網址
        default: "https://www.autorisk365.com"
      version:
        description: 版號
        default: "v1"
paths:
  /:
    post:
      operationId: createHardwareConfiguration
      summary: AR3-HardwareConfigurations-Create 新增硬體組態
      description: 新增一筆硬體組態資料
      tags:
        - HardwareConfigurations
      #      parameters:
      #        - $ref: '#/components/parameters/XTenantUidHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHardwareConfigurationRequest"
      responses:
        "200":
          description: 成功新增硬體組態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareConfigurationDetail"
    get:
      operationId: searchHardwareConfigurations
      summary: AR3-HardwareConfigurations-Search 查詢硬體組態列表
      description: 依條件查詢硬體組態列表，支援分頁
      tags:
        - HardwareConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - name: configurationCode
          in: query
          description: 組態編號 (支援模糊查詢)
          required: false
          schema:
            type: string
            example: "HW-1-1"
        - name: name
          in: query
          description: 資產名稱 (支援模糊查詢)
          required: false
          schema:
            type: string
            example: "FortiGate 防火牆"
        - name: assetTag
          in: query
          description: 財產編號或資產標籤
          required: false
          schema:
            type: string
            example: "ASSET-1001"
        #        - name: serialNumber
        #          in: query
        #          description: 序號 (支援模糊查詢)
        #          required: false
        #          schema:
        #            type: string
        #            example: "FGT60E-ABC12345"
        #        - $ref: '#/components/parameters/CategoryFilterParam'
        - $ref: "#/components/parameters/SubcategoryFilterParam"
        - $ref: "#/components/parameters/StatusFilterParam"
        - $ref: "#/components/parameters/OffsetParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SortByParam"
        - $ref: "#/components/parameters/SortOrderParam"
      responses:
        "200":
          description: 硬體組態分頁結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareConfigurationListResponse"
              examples:
                default:
                  summary: 依子類別與狀態查詢
                  value:
                    paging:
                      limit: 10
                      offset: 0
                      total: 2
                    items:
                      - uid: 11111111-2222-3333-4444-555555555555
                        configurationCode: HW-1-1-001
                        name: FortiGate 防火牆
                        category: HARDWARE
                        subcategory: FIREWALL
                        categoryDisplayName: "HARDWARE,HW"
                        subcategoryDisplayName: "1-1 防火牆"
                        assetTag: ASSET-1001
                        status: ENABLED
                        createdAt: 2024-03-01T02:00:00Z
                        updatedAt: 2024-04-05T07:30:00Z
                      - uid: 66666666-7777-8888-9999-000000000000
                        configurationCode: HW-1-1-002
                        name: Cisco 交換器
                        category: HARDWARE
                        subcategory: SWITCH
                        categoryDisplayName: "HARDWARE,HW"
                        subcategoryDisplayName: "1-2 交換器"
                        assetTag: ASSET-1002
                        status: DISABLED
                        createdAt: 2024-02-10T05:12:00Z
                        updatedAt: 2024-02-20T03:45:00Z
  /{uid}:
    get:
      operationId: readHardwareConfiguration
      summary: AR3-HardwareConfigurations-Read 查詢硬體組態
      description: 依 UID 查詢單筆硬體組態詳細資料
      tags:
        - HardwareConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - $ref: "#/components/parameters/UidPath"
      responses:
        "200":
          description: 成功查詢硬體組態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareConfigurationDetail"
    put:
      operationId: updateHardwareConfiguration
      summary: AR3-HardwareConfigurations-Update 更新硬體組態
      description: 更新單筆硬體組態資料
      tags:
        - HardwareConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - $ref: "#/components/parameters/UidPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHardwareConfigurationRequest"
      responses:
        "200":
          description: 成功更新硬體組態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareConfigurationDetail"
    delete:
      operationId: deleteHardwareConfiguration
      summary: AR3-HardwareConfigurations-Delete 刪除硬體組態
      description: 軟刪除單筆硬體組態資料 (設定 deleted=true)
      tags:
        - HardwareConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - $ref: "#/components/parameters/UidPath"
      responses:
        "204":
          description: 刪除成功，無回應內容
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 認證 Token
  parameters:
    XTenantUidHeader:
      name: X-Tenant-Uid
      in: header
      description: 租戶識別碼 (平臺管理員代理租戶時使用)。雖是非必填，但建議提供以提升防呆安全性(尤其是平台管理員在跨租戶操作時)。
      required: false
      schema:
        type: string
        format: uuid
    UidPath:
      name: uid
      in: path
      description: 資源的唯一識別碼
      required: true
      schema:
        type: string
        format: uuid
    CategoryFilterParam:
      name: category
      in: query
      description: 類別。
      required: false
      schema:
        type: string
    SubcategoryFilterParam:
      name: subcategory
      in: query
      description: 子類別。
      required: false
      schema:
        type: string
    StatusFilterParam:
      name: status
      in: query
      description: 依啟用狀態篩選。
      required: false
      schema:
        $ref: "#/components/schemas/ConfigurationStatus"
    LimitParam:
      name: limit
      in: query
      description: 回傳筆數上限，預設 20，最大 100。
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      description: 查詢位移量，搭配 `limit` 使用。
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    SortByParam:
      name: sortBy
      in: query
      description: 排序欄位，預設 `configurationCode`。
      required: false
      schema:
        type: string
        enum:
          - configurationCode
          - name
          - subcategory
          - status
          - createdAt
        default: configurationCode
    SortOrderParam:
      name: sortOrder
      in: query
      description: 排序方向，預設 `ASC` (組態編號由小到大)。
      required: false
      schema:
        type: string
        enum:
          - ASC
          - DESC
        default: ASC
  schemas:
    # ==================== 請求 Schemas ====================
    BaseHardwareConfigurationRequest:
      type: object
      description: 硬體組態請求資料
      required:
        - configurationCode
        - name
        - category
        - subcategory
        - location
        - status
        - informationSystemUids
      properties:
        category:
          type: string
          maxLength: 100
          description: 組態分類 (例如：5 Hardware,HW)
          example: "5 Hardware,HW"
        subcategory:
          type: string
          maxLength: 100
          description: 組態子分類 (例如：Firewall)
          example: "Firewall"
        configurationCode:
          type: string
          maxLength: 100
          description: 組態編號 (例如：HW-1-1-001)
          example: "HW-1-1-001"
        name:
          type: string
          maxLength: 255
          description: 資產名稱
          example: "FortiGate 60E"
        description:
          type: string
          description: 組態項目的詳細說明
          example: "邊界防火牆設備"
        model:
          type: string
          maxLength: 255
          description: 資產型號
          example: "FG-60E"
        responsibleDepartment:
          type: string
          maxLength: 255
          description: 權責部門名稱
          example: "資訊安全處"
        responsibleManager:
          type: string
          maxLength: 255
          description: 權責主管
          example: "張主管"
        assetOwner:
          type: string
          maxLength: 255
          description: 資產擁有者
          example: "王大明"
        #        assetCustodian:
        #          type: string
        #          maxLength: 255
        #          description: 資產管理者/保管人
        #          example: "李小華"
        assetTag:
          type: string
          maxLength: 255
          description: 財產編號或資產標籤
          example: "ASSET-1001"
        location:
          type: string
          maxLength: 255
          description: 資產所在地點
          example: "機房 A 區"
        rackCode:
          type: string
          maxLength: 100
          description: 機櫃編號
          example: "RACK-A01"
        rackUnit:
          type: string
          maxLength: 50
          description: 機櫃 U 號
          example: "U06"
        ipAddress:
          type: string
          maxLength: 100
          description: 設備 IP 位址
          example: "10.0.0.10"
        firmwareVersion:
          type: string
          maxLength: 100
          description: 韌體版本
          example: "v7.0.12"
        memorySpec:
          type: string
          maxLength: 100
          description: 記憶體規格
          example: "8GB DDR4"
        cpuSpec:
          type: string
          maxLength: 100
          description: CPU 規格
          example: "4C2.0GHz"
        storageCapacity:
          type: string
          maxLength: 100
          description: 儲存容量(硬體空間)
          example: "256GB SSD"
        status:
          $ref: "#/components/schemas/ConfigurationStatus"
        note:
          type: string
          description: 備註
          example: "年度汰換計畫設備"
        #        serialNumber:
        #          type: string
        #          maxLength: 255
        #          description: 出廠序號
        #          example: "FGT60E-ABC12345"
        #        propertyNumber:
        #          type: string
        #          maxLength: 255
        #          description: 機構內部財產編號 (若與資產標籤不同)
        #          example: "PROP-5566"
        #        purchaseDate:
        #          type: string
        #          format: date
        #          description: 採購日期
        #          example: "2024-01-15"
        #        warrantyExpiryDate:
        #          type: string
        #          format: date
        #          description: 保固到期日
        #          example: "2027-01-14"
        informationSystemUids:
          description: 關聯的資通系統 UID 清單
          type: array
          items:
            type: string
            format: uuid
            description: 關聯資通系統 UID
            example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
    CreateHardwareConfigurationRequest:
      allOf:
        - $ref: "#/components/schemas/BaseHardwareConfigurationRequest"
    UpdateHardwareConfigurationRequest:
      allOf:
        - $ref: "#/components/schemas/BaseHardwareConfigurationRequest"
    # ==================== 回應 Schemas ====================
    HardwareConfigurationSummary:
      type: object
      description: 硬體組態列表項目（簡化版）
      properties:
        uid:
          type: string
          format: uuid
          description: 硬體組態的唯一識別碼
        configurationCode:
          type: string
          description: 組態編號
        name:
          type: string
          description: 資產名稱
        category:
          type: string
          description: 組態分類
        subcategory:
          type: string
          description: 組態子分類
        categoryDisplayName:
          type: string
          description: 組態類別顯示名稱(名稱,代碼)
        subcategoryDisplayName:
          type: string
          description: 組態子類別顯示名稱(項次 名稱)
        assetTag:
          type: string
          description: 財產編號或資產標籤
        status:
          $ref: "#/components/schemas/ConfigurationStatus"
        createdAt:
          type: string
          format: date-time
          description: 建立時間 (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: 更新時間 (ISO 8601)
    HardwareConfigurationListResponse:
      type: object
      required:
        - paging
        - items
      properties:
        paging:
          $ref: "#/components/schemas/Paging"
        items:
          type: array
          items:
            $ref: "#/components/schemas/HardwareConfigurationSummary"
    HardwareConfigurationDetail:
      type: object
      description: 硬體組態回應資料
      allOf:
        - $ref: "#/components/schemas/HardwareConfigurationSummary"
        - type: object
          properties:
            #            tenant:
            #              $ref: '#/components/schemas/TenantSummary'
            configurationCodePrefix:
              type: string
              description: 組態編號的前綴代號
            configurationCodeSerialNumber:
              type: string
              description: 組態編號的後3碼流水號
            ciType:
              type: string
              description: 組態項目類型 (固定為 HARDWARE)
              example: "HARDWARE"
            description:
              type: string
              description: 組態項目的詳細說明
            model:
              type: string
              description: 資產型號
            responsibleDepartment:
              type: string
              description: 權責部門名稱
            responsibleManager:
              type: string
              description: 權責主管
            assetOwner:
              type: string
              description: 資產擁有者
            #            assetCustodian:
            #              type: string
            #              description: 資產管理者/保管人
            location:
              type: string
              description: 資產所在地點
            rackCode:
              type: string
              description: 機櫃編號
            rackUnit:
              type: string
              description: 機櫃 U 號
            ipAddress:
              type: string
              description: 設備 IP 位址
            firmwareVersion:
              type: string
              description: 韌體版本
            memorySpec:
              type: string
              description: 記憶體規格
            cpuSpec:
              type: string
              description: CPU 規格
            storageCapacity:
              type: string
              description: 儲存容量(硬體空間)
            status:
              $ref: "#/components/schemas/ConfigurationStatus"
            note:
              type: string
              description: 備註
            #            serialNumber:
            #              type: string
            #              description: 出廠序號
            #            propertyNumber:
            #              type: string
            #              description: 機構內部財產編號
            #            purchaseDate:
            #              type: string
            #              format: date
            #              description: 採購日期
            #            warrantyExpiryDate:
            #              type: string
            #              format: date
            #              description: 保固到期日
            informationSystems:
              description: 關聯的資通系統
              type: array
              items:
                - $ref: "#/components/schemas/InformationSystemSummary"
            createdAt:
              type: string
              format: date-time
              description: 資料建立時間
            updatedAt:
              type: string
              format: date-time
              description: 資料最後更新時間
            createdBy:
              $ref: "#/components/schemas/AccountSummary"
            updatedBy:
              $ref: "#/components/schemas/AccountSummary"
    InformationSystemSummary:
      type: object
      description: 資通系統參照
      properties:
        uid:
          type: string
          format: uuid
          description: 資通系統 UID
        name:
          type: string
          description: 資通系統名稱
        status:
          type: string
          description: 啟用狀態 (ENABLED/DISABLED)
          enum:
            - ENABLED
            - DISABLED
    AccountSummary:
      type: object
      required:
        - uid
        - username
      properties:
        uid:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          description: 來源自 `accounts.display_name`。聯絡人姓名。
    TenantSummary:
      type: object
      required:
        - uid
        - name
      properties:
        uid:
          type: string
          format: uuid
        name:
          type: string
    # ==================== 分頁 Schemas ====================
    Paging:
      description: 分頁資訊
      type: object
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
    # ==================== 通用 Schemas ====================
    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          minimum: 400
        error:
          type: string
        code:
          type: string
          description: 系統定義錯誤代碼（例如 `ACCOUNT_DUPLICATE_USERNAME`）。
        message:
          type: string
        path:
          type: string
          description: 觸發錯誤的 API 路徑
        traceId:
          type: string
          description: 方便串接觀察性的追蹤 Id
        details:
          type: array
          items:
            $ref: "#/components/schemas/FieldViolation"
    FieldViolation:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
        rejectedValue:
          description: 提供除錯用途的原始值（必要時遮蔽）。
          oneOf:
            - type: string
            - type: number
            - type: boolean
    ConfigurationStatus:
      type: string
      description: 啟用狀態。
      enum:
        - ENABLED
        - DISABLED
  responses:
    BadRequest:
      description: 請求參數或內容錯誤
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未通過身分驗證或憑證失效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: 已登入但權限不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 找不到指定資源
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 資源狀態衝突（例如帳號或 Email 已存在、密碼與確認密碼不同）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: 未預期的伺服器錯誤
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
security:
  - BearerAuth: []
tags:
  - name: HardwareConfigurations
    description: 硬體組態管理相關 API
