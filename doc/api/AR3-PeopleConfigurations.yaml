openapi: 3.1.0
info:
  title: AR3-PeopleConfigurations 組織組態管理
  description: |
    ## API 清單
    * AR3-PeopleConfigurations-Create 新增組織組態
    * AR3-PeopleConfigurations-Search 查詢組織組態列表
    * AR3-PeopleConfigurations-Read 查詢組織組態
    * AR3-PeopleConfigurations-Update 更新組織組態
    * AR3-PeopleConfigurations-Delete 刪除組織組態
        
    ## 非200狀態回應說明
    目前定義的異常狀態如下，以下狀態於各API回應內容格式皆相同，因此各API預設只描述正常 200 的回應情況。
    * 請求格式錯誤。 http status code 400。
    * 缺少 ApiKey, AccessToken 或是驗證失敗。 http status code 401。
    * 操作權限不足。 http status code 403。
    * 請求的資源不存在。 http status code 404。
    * 資源衝突錯誤。 http status code 409。
    * 伺服端錯誤。 http status code 500。
  version: 1.0.0
servers:
  - url: "{baseUrl}/api/{version}/people-configurations"
    variables:
      baseUrl:
        description: 主機網址
        default: "https://www.autorisk365.com"
      version:
        description: 版號
        default: "v1"
paths:
  /:
    post:
      operationId: createPeopleConfiguration
      summary: AR3-PeopleConfigurations-Create 新增組織組態
      description: 新增一筆組織組態資料
      tags:
        - PeopleConfigurations
      #      parameters:
      #        - $ref: '#/components/parameters/XTenantUidHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationConfigurationRequest"
      responses:
        "200":
          description: 成功新增組織組態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationConfigurationDetail"
    get:
      operationId: searchPeopleConfigurations
      summary: AR3-PeopleConfigurations-Search 查詢組織組態列表
      description: 依條件查詢組織組態列表，支援分頁
      tags:
        - PeopleConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - name: configurationCode
          in: query
          description: 組態編號 (支援模糊查詢)
          required: false
          schema:
            type: string
            example: "PE-1-1-001"
        - name: name
          in: query
          description: 資產名稱 (支援模糊查詢)
          required: false
          schema:
            type: string
            example: "資訊安全組織角色名稱"
        #        - $ref: '#/components/parameters/CategoryFilterParam'
        - $ref: "#/components/parameters/SubcategoryFilterParam"
        - $ref: "#/components/parameters/StatusFilterParam"
        - $ref: "#/components/parameters/OffsetParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SortByParam"
        - $ref: "#/components/parameters/SortOrderParam"
      responses:
        "200":
          description: 組織組態分頁結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationConfigurationListResponse"
              examples:
                default:
                  summary: 依子類別與狀態查詢
                  value:
                    paging:
                      limit: 10
                      offset: 0
                      total: 2
                    items:
                      - uid: 12345678-1234-1234-1234-1234567890ab
                        configurationCode: PE-1-1-001
                        name: 資安組織職責
                        category: ORGANIZATION
                        subcategory: ROLE
                        categoryDisplayName: "ORGANIZATION,PE"
                        subcategoryDisplayName: "1-1 組織職責"
                        status: ENABLED
                        createdAt: 2024-03-01T02:00:00Z
                        updatedAt: 2024-04-05T07:30:00Z
                      - uid: 22345678-1234-1234-1234-1234567890ab
                        configurationCode: PE-1-1-002
                        name: 資安委員會
                        category: ORGANIZATION
                        subcategory: ROLE
                        categoryDisplayName: "ORGANIZATION,PE"
                        subcategoryDisplayName: "1-1 組織職責"
                        status: DISABLED
                        createdAt: 2024-02-10T05:12:00Z
                        updatedAt: 2024-02-20T03:45:00Z
  /{uid}:
    get:
      operationId: readOrganizationConfiguration
      summary: AR3-PeopleConfigurations-Read 查詢組織組態
      description: 依 UID 查詢單筆組織組態詳細資料
      tags:
        - PeopleConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - $ref: "#/components/parameters/UidPath"
      responses:
        "200":
          description: 成功查詢組織組態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationConfigurationDetail"
    put:
      operationId: updateOrganizationConfiguration
      summary: AR3-PeopleConfigurations-Update 更新組織組態
      description: 更新單筆組織組態資料
      tags:
        - PeopleConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - $ref: "#/components/parameters/UidPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationConfigurationRequest"
      responses:
        "200":
          description: 成功更新組織組態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationConfigurationDetail"
    delete:
      operationId: deleteOrganizationConfiguration
      summary: AR3-PeopleConfigurations-Delete 刪除組織組態
      description: 軟刪除單筆組織組態資料 (設定 deleted=true)
      tags:
        - PeopleConfigurations
      parameters:
        #        - $ref: '#/components/parameters/XTenantUidHeader'
        - $ref: "#/components/parameters/UidPath"
      responses:
        "204":
          description: 刪除成功，無回應內容
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 認證 Token
  parameters:
    XTenantUidHeader:
      name: X-Tenant-Uid
      in: header
      description: 租戶識別碼 (平臺管理員代理租戶時使用)。雖是非必填，但建議提供以提升防呆安全性(尤其是平台管理員在跨租戶操作時)。
      required: false
      schema:
        type: string
        format: uuid
    UidPath:
      name: uid
      in: path
      description: 資源的唯一識別碼
      required: true
      schema:
        type: string
        format: uuid
    CategoryFilterParam:
      name: category
      in: query
      description: 類別。
      required: false
      schema:
        type: string
    SubcategoryFilterParam:
      name: subcategory
      in: query
      description: 子類別。
      required: false
      schema:
        type: string
    StatusFilterParam:
      name: status
      in: query
      description: 依啟用狀態篩選。
      required: false
      schema:
        $ref: "#/components/schemas/ConfigurationStatus"
    SortByParam:
      name: sortBy
      in: query
      description: 排序欄位，預設 `configurationCode`。
      required: false
      schema:
        type: string
        enum:
          - configurationCode
          - name
          - subcategory
          - status
        default: configurationCode
    SortOrderParam:
      name: sortOrder
      in: query
      description: 排序方向，預設 `ASC`。
      required: false
      schema:
        type: string
        enum:
          - ASC
          - DESC
        default: ASC
    LimitParam:
      name: limit
      in: query
      description: 回傳筆數上限，預設 20，最大 100。
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      description: 查詢位移量，搭配 `limit` 使用。
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
  schemas:
    # ==================== 請求 Schemas ====================
    BaseOrganizationConfigurationRequest:
      type: object
      description: 組織組態請求資料
      required:
        - configurationCode
        - name
        - category
        - subcategory
        - location
        - status
      properties:
        configurationCode:
          type: string
          maxLength: 100
          description: 組態編號 (例如：PE-1-1-001)
          example: "PE-1-1-001"
        name:
          type: string
          maxLength: 255
          description: 資產名稱
          example: "資訊安全組織角色名稱"
        description:
          type: string
          description: 組態項目的詳細說明
          example: "內部人員角色"
        category:
          type: string
          maxLength: 100
          description: 組態分類 (例如：1 People,PE)
          example: "1 People,PE"
        subcategory:
          type: string
          maxLength: 100
          description: 組態子分類 (例如：內部人員、外部人員)
          example: "內部人員"
        model:
          type: string
          maxLength: 255
          description: 資產型號
          example: "資訊安全組織角色"
        responsibleDepartment:
          type: string
          maxLength: 255
          description: 權責部門名稱
          example: "資訊安全處"
        responsibleManager:
          type: string
          maxLength: 255
          description: 權責主管
          example: "王大明"
        assetOwner:
          type: string
          maxLength: 255
          description: 資產擁有者
          example: "李小華"
        #        assetCustodian:
        #          type: string
        #          maxLength: 255
        #          description: 資產管理者/保管人 (原型未顯示)
        location:
          type: string
          maxLength: 255
          description: 資產所在地點
          example: "總部"
        #        ownerUid:
        #          type: string
        #          format: uuid
        #          description: 此資產的負責人 UID (原型未顯示)
        #        departmentUid:
        #          type: string
        #          format: uuid
        #          description: 此資產所屬的部門 UID (原型未顯示)
        status:
          $ref: "#/components/schemas/ConfigurationStatus"
        note:
          type: string
          description: 備註
          example: "委外人員角色"
    #        headcount:
    #          type: integer
    #          minimum: 0
    #          description: 人員數量 (DB 欄位，原型未顯示)
    CreateOrganizationConfigurationRequest:
      allOf:
        - $ref: "#/components/schemas/BaseOrganizationConfigurationRequest"
    UpdateOrganizationConfigurationRequest:
      allOf:
        - $ref: "#/components/schemas/BaseOrganizationConfigurationRequest"
    # ==================== 回應 Schemas ====================
    PeopleConfigurationsummary:
      type: object
      description: 組織組態列表項目（簡化版）
      properties:
        uid:
          type: string
          format: uuid
          description: 組織組態的唯一識別碼
        configurationCode:
          type: string
          description: 組態編號
        name:
          type: string
          description: 資產名稱
        createdAt:
          type: string
          format: date-time
          description: 建立時間 (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: 更新時間 (ISO 8601)
        category:
          type: string
          description: 組態分類
        subcategory:
          type: string
          description: 組態子分類
        categoryDisplayName:
          type: string
          description: 組態類別顯示名稱(名稱,代碼)
        subcategoryDisplayName:
          type: string
          description: 組態子類別顯示名稱(項次 名稱)
        status:
          $ref: "#/components/schemas/ConfigurationStatus"
    OrganizationConfigurationListResponse:
      type: object
      required:
        - paging
        - items
      properties:
        paging:
          $ref: "#/components/schemas/Paging"
        items:
          type: array
          items:
            $ref: "#/components/schemas/PeopleConfigurationsummary"
    OrganizationConfigurationDetail:
      type: object
      description: 組織組態回應資料
      allOf:
        - $ref: "#/components/schemas/PeopleConfigurationsummary"
        - type: object
          properties:
            #            tenant:
            #              $ref: '#/components/schemas/TenantSummary'
            configurationCodePrefix:
              type: string
              description: 組態編號的前綴代號
            configurationCodeSerialNumber:
              type: string
              description: 組態編號的後3碼流水號
            ciType:
              type: string
              description: 組態項目類型 (固定為 ORGANIZATION)
              example: "ORGANIZATION"
            description:
              type: string
              description: 組態項目的詳細說明
            model:
              type: string
              description: 資產型號
            responsibleDepartment:
              type: string
              description: 權責部門名稱
            responsibleManager:
              type: string
              description: 權責主管
            assetOwner:
              type: string
              description: 資產擁有者
            #            assetCustodian:
            #              type: string
            #              description: 資產管理者/保管人 (原型未顯示)
            location:
              type: string
              description: 資產所在地點
            #            enabled:
            #              type: boolean
            #              description: 是否啟用
            status:
              $ref: "#/components/schemas/ConfigurationStatus"
            note:
              type: string
              description: 備註
            #            headcount:
            #              type: integer
            #              description: 人員數量 (DB 欄位，原型未顯示)
            createdAt:
              type: string
              format: date-time
              description: 資料建立時間
            updatedAt:
              type: string
              format: date-time
              description: 資料最後更新時間
            createdBy:
              $ref: "#/components/schemas/AccountSummary"
            updatedBy:
              $ref: "#/components/schemas/AccountSummary"
    AccountSummary:
      type: object
      required:
        - uid
        - username
      properties:
        uid:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          description: 來源自 `accounts.display_name`。聯絡人姓名。
    TenantSummary:
      type: object
      required:
        - uid
        - name
      properties:
        uid:
          type: string
          format: uuid
        name:
          type: string
    # ==================== 分頁 Schemas ====================
    Paging:
      description: 分頁資訊
      type: object
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
    # ==================== 通用 Schemas ====================
    ConfigurationStatus:
      type: string
      description: 啟用狀態。
      enum:
        - ENABLED
        - DISABLED
    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          minimum: 400
        error:
          type: string
        code:
          type: string
          description: 系統定義錯誤代碼（例如 `ACCOUNT_DUPLICATE_USERNAME`）。
        message:
          type: string
        path:
          type: string
          description: 觸發錯誤的 API 路徑
        traceId:
          type: string
          description: 方便串接觀察性的追蹤 Id
        details:
          type: array
          items:
            $ref: "#/components/schemas/FieldViolation"
    FieldViolation:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
        rejectedValue:
          description: 提供除錯用途的原始值（必要時遮蔽）。
          oneOf:
            - type: string
            - type: number
            - type: boolean

  responses:
    BadRequest:
      description: 請求參數或內容錯誤
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未通過身分驗證或憑證失效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: 已登入但權限不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 找不到指定資源
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 資源狀態衝突（例如帳號或 Email 已存在、密碼與確認密碼不同）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: 未預期的伺服器錯誤
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
security:
  - BearerAuth: []
tags:
  - name: PeopleConfigurations
    description: 組織組態管理相關 API
